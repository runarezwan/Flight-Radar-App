<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyTrack Pro | Premium Flight Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="logo">
          <span class="icon">✈</span>
          <h1>SKYTRACK PRO</h1>
        </div>
        <div class="stats glass">
          <div class="stat-item">
            <span class="label">LIVE FLIGHTS</span>
            <span id="flight-count" class="value">0</span>
          </div>
          <div class="stat-item">
            <span class="label">LAST UPDATE</span>
            <span id="last-update" class="value">--:--:--</span>
          </div>
        </div>
      </header>

      <main>
        <div id="map"></div>
        
        <aside class="sidebar glass" id="sidebar">
          <div class="sidebar-header">
            <h2>Active Flights</h2>
            <div class="search-box">
              <input type="text" id="flight-search" placeholder="Search callsign..." />
            </div>
          </div>
          <div class="flight-list" id="flight-list">
            <div class="loading-state">
              <div class="spinner"></div>
              <span>Searching the skies...</span>
            </div>
          </div>
        </aside>

        <div id="flight-details" class="details-panel glass hidden">
          <button class="close-btn" id="close-details">×</button>
          <div id="details-content"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
